# ============================================
# RENDER BLUEPRINT — Auto-deploy all 3 services
# ============================================
# Push this repo to GitHub, then go to:
# https://dashboard.render.com/blueprints → New Blueprint Instance
# Connect your GitHub repo and Render deploys everything automatically.

services:
  # ---- 1. Node.js Backend (Express API Gateway) ----
  - type: web
    name: riskai-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false  # You'll set this manually (MongoDB Atlas connection string)
      - key: AI_SERVICE_URL
        fromService:
          name: riskai-ai-service
          type: web
          property: hostport
          # This auto-links to the AI service URL
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random secret
      - key: AUTH_ENABLED
        value: "false"
    healthCheckPath: /api/health

  # ---- 2. Python AI Service (FastAPI + RAG) ----
  - type: web
    name: riskai-ai-service
    runtime: python
    region: oregon
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # You'll set this manually
      - key: LLM_PROVIDER
        value: gemini
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health

  # ---- 3. React Frontend (Static Site) ----
  - type: web
    name: riskai-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: riskai-backend
          type: web
          property: host
