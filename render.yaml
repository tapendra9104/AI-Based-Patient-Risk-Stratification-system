services:
  - type: web
    name: riskai-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: AI_SERVICE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AUTH_ENABLED
        value: "false"
    healthCheckPath: /api/health
  - type: web
    name: riskai-ai-service
    runtime: python
    region: oregon
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /health
  - type: web
    name: riskai-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
