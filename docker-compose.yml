services:
  backend:
    build:
      context: ./backend
    container_name: patient-risk-backend
    environment:
      APP_ENV: development
      DATABASE_URL: sqlite:////app/data/patient_risk.db
      MODEL_PATH: /app/models/risk_model.joblib
      AUTH_REQUIRED: "true"
      ALLOWED_ORIGINS: http://localhost:5500,http://127.0.0.1:5500
      ALERT_PROVIDER: console
    ports:
      - "5000:5000"
    volumes:
      - ./backend/models:/app/models
      - ./backend/data:/app/data
